<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VerifyAI · Certificate Verification</title>
<style>
  :root { --bg:#0b0f14; --card:#121821; --line:#1f2a37; --txt:#e6edf3; --dim:#8b98a5; --ok:#2ea043; --bad:#cf222e; --gold:#d4af37; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--txt); font-family:ui-monospace,SFMono-Regular,Menlo,monospace; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
  .wrap { width:100%; max-width:640px; }
  h1 { font-size:20px; letter-spacing:1px; margin:0 0 4px; }
  .sub { color:var(--dim); font-size:13px; margin-bottom:24px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:24px; }
  label { display:block; font-size:12px; color:var(--dim); margin-bottom:6px; }
  input { width:100%; background:#0b0f14; border:1px solid var(--line); color:var(--txt); padding:10px 12px; border-radius:8px; font-family:inherit; font-size:13px; margin-bottom:12px; }
  button { background:var(--gold); color:#0b0f14; border:0; padding:10px 18px; border-radius:8px; font-weight:600; cursor:pointer; font-family:inherit; }
  button:disabled { opacity:.5; cursor:wait; }
  .result { margin-top:20px; display:none; }
  .badge { display:inline-flex; align-items:center; gap:8px; padding:6px 12px; border-radius:999px; font-size:13px; font-weight:600; }
  .badge.ok { background:rgba(46,160,67,.15); color:var(--ok); border:1px solid var(--ok); }
  .badge.bad { background:rgba(207,34,46,.15); color:var(--bad); border:1px solid var(--bad); }
  .kv { margin-top:16px; font-size:12px; }
  .kv div { display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px solid var(--line); }
  .kv .k { color:var(--dim); }
  .kv .v { text-align:right; word-break:break-all; max-width:60%; }
  .err { color:var(--bad); font-size:13px; margin-top:12px; }
  .seal { color:var(--gold); font-size:11px; letter-spacing:2px; margin-top:24px; text-align:center; }
  a { color:var(--gold); }
</style>
</head>
<body>
<div class="wrap">
  <h1>VerifyAI · Certificate Verification</h1>
  <div class="sub">Independent third-party verification of a determinism / compliance sweep certificate. Ed25519 signature checked against the published issuer key.</div>
  <div class="card">
    <label>Account ID</label>
    <input id="account" placeholder="echelor-design-partner-01" value="echelor-design-partner-01">
    <label>Workflow ID</label>
    <input id="workflow" placeholder="echelor-ai-chat" value="echelor-ai-chat">
    <button id="btn" onclick="verify()">Verify certificate</button>
    <div class="err" id="err"></div>
    <div class="result" id="result"></div>
  </div>
  <div class="seal">✦ SECURITAS · STABILITAS · SIGNUM ✦</div>
</div>
<script>
const BACKEND = "https://vje013--verifyai-backend-certificate.modal.run";
async function verify(){
  const btn=document.getElementById('btn');
  const err=document.getElementById('err');
  const res=document.getElementById('result');
  err.textContent=''; res.style.display='none';
  const account=document.getElementById('account').value.trim();
  const workflow=document.getElementById('workflow').value.trim();
  if(!account||!workflow){ err.textContent='Account ID and Workflow ID required.'; return; }
  btn.disabled=true; btn.textContent='Verifying…';
  try{
    const url=`${BACKEND}?account_id=${encodeURIComponent(account)}&workflow_id=${encodeURIComponent(workflow)}&verify=true`;
    const r=await fetch(url);
    if(!r.ok){ throw new Error(`No certificate found (HTTP ${r.status})`); }
    const d=await r.json();
    const v=d.verification||{};
    const ok=v.valid===true;
    res.innerHTML=`
      <span class="badge ${ok?'ok':'bad'}">${ok?'✓ VALID SIGNATURE':'✗ INVALID'}</span>
      <div class="kv">
        <div><span class="k">Sweep ID</span><span class="v">${d.sweep_id||'—'}</span></div>
        <div><span class="k">Account</span><span class="v">${d.account_id||'—'}</span></div>
        <div><span class="k">Workflow</span><span class="v">${d.workflow_id||'—'}</span></div>
        <div><span class="k">Kind</span><span class="v">${d.kind||'—'}</span></div>
        <div><span class="k">Algorithm</span><span class="v">${v.algorithm||d.signature_algorithm||'—'}</span></div>
        <div><span class="k">Signer key</span><span class="v">${v.signer_key_id||'—'}</span></div>
        <div><span class="k">Payload SHA-256</span><span class="v">${(v.payload_sha256||'—').slice(0,24)}…</span></div>
        <div><span class="k">Public key</span><span class="v"><a href="${d.public_key_url}" target="_blank">issuer-keys.json</a></span></div>
        <div><span class="k">Issuer</span><span class="v">${d.issuer||'—'}</span></div>
      </div>`;
    res.style.display='block';
  }catch(e){ err.textContent=e.message; }
  finally{ btn.disabled=false; btn.textContent='Verify certificate'; }
}
</script>
</body>
</html>
